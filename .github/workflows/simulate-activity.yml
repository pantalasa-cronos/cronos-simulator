name: Simulate activity

# Pushes Pareto-weighted commits across the simulated repo fleet. A
# configurable fraction (CI_SAMPLE_PCT, default 50) trigger the component
# repo's CI workflow (and the lunar-ci-action inside it); the rest carry
# [skip ci]. See README.md for the full set of vars & secrets.

on:
  schedule:
    # Steadier load than a single hourly burst; batch size scales with fleet (see README).
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      commits:
        description: "Commits to push; 0 = auto from ledger size (vars COMMITS_*)."
        default: "0"
      dry_run:
        description: "Log targets but do not push"
        type: boolean
        default: false
      force:
        description: "Run even if ACTIVITY_ENABLED=false"
        type: boolean
        default: false
      ci_sample_pct:
        description: "Percent of commits that trigger CI (0-100). Empty = use vars.CI_SAMPLE_PCT (default 50)."
        default: ""

concurrency:
  group: cronos-simulator-activity
  cancel-in-progress: false

jobs:
  activity:
    if: ${{ vars.ACTIVITY_ENABLED == 'true' || inputs.force == true }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GH_PAT_CRONOS_SIMULATOR }}
      SIMULATOR_ORG: ${{ vars.SIMULATOR_ORG || 'pantalasa-cronos' }}
      COMMITS_SCALE_PCT: ${{ vars.COMMITS_SCALE_PCT }}
      COMMITS_MIN: ${{ vars.COMMITS_MIN }}
      COMMITS_PER_RUN: ${{ vars.COMMITS_PER_RUN }}
      CI_SAMPLE_PCT: ${{ inputs.ci_sample_pct != '' && inputs.ci_sample_pct || vars.CI_SAMPLE_PCT || '50' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set origin URL with PAT
        env:
          PAT: ${{ secrets.GH_PAT_CRONOS_SIMULATOR }}
        run: |
          git remote set-url origin "https://x-access-token:${PAT}@github.com/${{ github.repository }}.git"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure git
        run: |
          git config --global user.name  "cronos-simulator"
          git config --global user.email "simulator@pantalasa.org"

      - name: Push synthetic commits
        run: |
          set -euo pipefail
          WANT="${{ inputs.commits }}"
          if [ -z "${WANT}" ] || [ "${WANT}" = "0" ]; then
            LEDGER="${GITHUB_WORKSPACE}/state/repos.jsonl"
            LINES=$(wc -l < "${LEDGER}" | tr -d ' ')
            PCT="${COMMITS_SCALE_PCT:-2}"
            MIN_C="${COMMITS_MIN:-5}"
            MAX_C="${COMMITS_PER_RUN:-80}"
            COMMITS=$(( LINES * PCT / 100 ))
            if [ "${COMMITS}" -lt "${MIN_C}" ]; then COMMITS=${MIN_C}; fi
            if [ "${COMMITS}" -gt "${MAX_C}" ]; then COMMITS=${MAX_C}; fi
            echo "Fleet (ledger lines): ${LINES} -> commits this run: ${COMMITS} (pct=${PCT} min=${MIN_C} max=${MAX_C})"
            ARGS=(--commits "${COMMITS}")
          else
            ARGS=(--commits "${WANT}")
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS+=(--dry-run)
          fi
          python scripts/simulate-activity.py "${ARGS[@]}"

      - name: Commit ledger updates
        run: |
          set -euo pipefail
          if [ -n "$(git status --porcelain state/repos.jsonl)" ]; then
            git add state/repos.jsonl
            git commit -m "chore(state): update last_commit_at (run ${{ github.run_id }})"
            git push
          else
            echo "No ledger changes to commit"
          fi
