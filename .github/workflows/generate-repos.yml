name: Generate repos

# Creates AI-authored repos in the pantalasa-cronos org and records them in
# state/repos.jsonl. See README.md for the full set of vars & secrets.

on:
  schedule:
    # TEMP: every 15m to verify scheduled runs after flipping ENABLED (restore below).
    # Tune cadence when ENABLED=true:
    #   0 */6 * * *   - 4x/day
    #   0 */3 * * *   - 8x/day (accelerate ramp)
    #   0 */12 * * *  - 2x/day (slow down)
    #   0 2 * * *     - 1x/day (maintenance mode post-1000)
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      count:
        description: "How many repos to generate in this run"
        default: "38"
      force:
        description: "Run even if ENABLED=false (and ignore TARGET_REPOS)"
        type: boolean
        default: false

concurrency:
  group: cronos-simulator-generate
  cancel-in-progress: false

jobs:
  generate:
    if: ${{ vars.ENABLED == 'true' || inputs.force == true }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GH_PAT_CRONOS_SIMULATOR }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_CRONOS_SIMULATOR }}
      SIMULATOR_ORG: ${{ vars.SIMULATOR_ORG || 'pantalasa-cronos' }}
      TARGET_REPOS: ${{ vars.TARGET_REPOS || '1000' }}
      SLEEP_MIN_SECONDS: ${{ vars.SLEEP_MIN_SECONDS || '30' }}
      SLEEP_MAX_SECONDS: ${{ vars.SLEEP_MAX_SECONDS || '60' }}
      CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL || 'sonnet' }}
      CLAUDE_MAX_TOKENS: ${{ vars.CLAUDE_MAX_TOKENS || '16000' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set origin URL with PAT
        env:
          PAT: ${{ secrets.GH_PAT_CRONOS_SIMULATOR }}
        run: |
          git remote set-url origin "https://x-access-token:${PAT}@github.com/${{ github.repository }}.git"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install pyyaml
          gh --version

      - name: Configure git
        run: |
          git config --global user.name  "cronos-simulator"
          git config --global user.email "simulator@pantalasa.org"

      - name: Diagnose PAT
        run: |
          set -uo pipefail
          TOKEN_LEN="$(printf '%s' "$GH_TOKEN" | wc -c)"
          TOKEN_SHA="$(printf '%s' "$GH_TOKEN" | sha256sum | awk '{print $1}')"
          echo "GH_TOKEN byte length: $TOKEN_LEN"
          echo "GH_TOKEN sha256:      $TOKEN_SHA"
          # Direct API call bypassing gh; print status only.
          STATUS=$(curl -sS -o /dev/null -w '%{http_code}' \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "User-Agent: cronos-simulator" \
            https://api.github.com/user)
          echo "GET /user status: $STATUS"

      - name: Generate repos
        run: |
          set -euo pipefail
          COUNT="${{ inputs.count || vars.REPOS_PER_RUN || '38' }}"
          ARGS=(--count "$COUNT")
          if [ "${{ inputs.force }}" = "true" ]; then
            ARGS+=(--force)
          fi
          python scripts/gen-repo.py "${ARGS[@]}"

      - name: Commit ledger updates
        run: |
          set -euo pipefail
          if [ -n "$(git status --porcelain state/repos.jsonl)" ]; then
            git add state/repos.jsonl
            git commit -m "chore(state): update repos.jsonl (run ${{ github.run_id }})"
            git push
          else
            echo "No ledger changes to commit"
          fi
