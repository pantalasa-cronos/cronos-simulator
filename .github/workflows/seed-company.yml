name: Seed company

# Generates seed/company.json via Claude Code and opens a PR with the result.
# Runs manually only — regenerate when you want a new persona.

on:
  workflow_dispatch:
    inputs:
      model:
        description: "Claude model to use (alias or full id)"
        default: "opus"
      dry_run:
        description: "If true, print the generated JSON to the job log without committing"
        type: boolean
        default: false

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate seed/company.json
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_CRONOS_SIMULATOR }}
          CLAUDE_MODEL: ${{ inputs.model }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '0' }}
        run: bash scripts/gen-company.sh

      - name: Commit and open PR
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_CRONOS_SIMULATOR }}
          PAT: ${{ secrets.GH_PAT_CRONOS_SIMULATOR }}
        run: |
          set -euo pipefail

          git config --global user.name  "cronos-simulator"
          git config --global user.email "simulator@pantalasa.org"

          if [ -z "$(git status --porcelain seed/company.json)" ]; then
            echo "No changes to seed/company.json; nothing to do."
            exit 0
          fi

          # Swap origin to use our PAT. The default origin was set up by
          # actions/checkout with the ephemeral GITHUB_TOKEN (read-only for
          # our purposes), which can't push a new branch.
          git remote set-url origin "https://x-access-token:${PAT}@github.com/${{ github.repository }}.git"

          BRANCH="seed/company-${{ github.run_id }}"
          git checkout -b "$BRANCH"
          git add seed/company.json
          git commit -m "Regenerate seed/company.json (model: ${{ inputs.model }})"
          git push -u origin "$BRANCH"

          gh pr create \
            --repo "${{ github.repository }}" \
            --base main \
            --head "$BRANCH" \
            --title "Regenerate seed/company.json" \
            --body "Regenerated via the **Seed company** workflow.

          Model: \`${{ inputs.model }}\`

          Review the domain list, subdomains, people, and commit authors before merging."
