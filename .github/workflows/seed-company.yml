name: Seed company

# Generates seed/company.json via Claude Code and opens a PR with the result.
# Runs manually only — regenerate when you want a new persona.

on:
  workflow_dispatch:
    inputs:
      model:
        description: "Claude model to use (alias or full id)"
        default: "opus"
      dry_run:
        description: "If true, print the generated JSON to the job log without committing"
        type: boolean
        default: false

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Claude Code CLI
        run: |
          set -euo pipefail
          npm install -g @anthropic-ai/claude-code
          claude --version

      - name: Generate seed/company.json
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_CRONOS_SIMULATOR }}
          CLAUDE_MODEL: ${{ inputs.model }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '0' }}
        run: bash scripts/gen-company.sh

      - name: Create PR with seed/company.json
        if: ${{ !inputs.dry_run }}
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GH_PAT_CRONOS_SIMULATOR }}
          commit-message: "Regenerate seed/company.json"
          title: "Regenerate seed/company.json"
          body: |
            Regenerated via `Seed company` workflow.

            Model: `${{ inputs.model }}`

            Review the domain list, subdomains, people, and commit authors before merging.
          branch: "seed/company"
          delete-branch: true
          add-paths: |
            seed/company.json
